name: Kivo-CI
on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017
        options: --name mongodb
        command: mongod --replSet rs0 --bind_ip_all
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - run: npm ci
      - name: Start Mongo
        run: |
          docker exec mongodb mongosh --eval "rs.initiate({ _id: 'rs0', members: [{ _id: 0, host: 'localhost:27017' }] })"
          sleep 10
      - name: Run Tests
        run: npm test
        env:
          NODE_ENV: test
          DATABASE_URL: mongodb://localhost:27017/Kivo-Test?replicaSet=rs0
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          PAYSTACK_SECRET_KEY: ${{ secrets.PAYSTACK_SECRET_KEY }}
          PAYSTACK_BASE_API: https://api.paystack.co
          REDIS_PUBLIC_URL: redis://localhost:6379
          CLIENT_ORIGIN: http://localhost:3000
          API_URL: http://localhost:5000
          KIVO_TAX_PERCENTAGE: 0.05
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
